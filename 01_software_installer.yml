python_installers:
  title: "Python Installers"
  description: "Use this for software installers. And also wherever Python is used."
  step_1:
    - "Click on the Windows Start button."
    - "Type \"Windows PowerShell\" in the search bar."
    - "Look for the Windows PowerShell in the search results."
    - "Right click on it and select run as administrator."
    - "Copy the following command and run it."
  command: "iex (Invoke-WebRequest -Uri \"https://raw.githubusercontent.com/tinitiateprime/tinitiate-onboarding/main/software-installers/windows/python-installers/python_installers.ps1\" -UseBasicParsing).Content"
  wait: "Wait until everything gets installed."
  repeat: "After the completion of the above, restart your system and run the above command once again."
  step_2:
    check: "Restart your system and check the installation of the following:"
    items:
      - "Chocolatey (The software app store)"
      - "Python"
      - "Notepad++"
      - "Git"
      - "VS Code"
      - "DBeaver Community"
      - "MS Teams(Work or School)"
      - "Zoom"
