services:
  mysql:
    image: mysql:8.0
    container_name: ti-python-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: training
      MYSQL_USER: student
      MYSQL_PASSWORD: student
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: ti-python-jupyter
    depends_on:
      - mysql
      - tutorials
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: admin123
    volumes:
      - ./notebooks:/home/jovyan/work

  tutorials:
    image: alpine/git:latest
    container_name: ti-python-tutorials
    working_dir: /tutorials
    volumes:
      - ./notebooks/tutorials:/tutorials
    command: >
      sh -lc "for repo in
      https://github.com/tinitiateprime/python.git;
      do name=$$(basename $$repo .git);
      if [ -d $$name/.git ]; then git -C $$name pull --ff-only;
      else git clone $$repo; fi;
      done"

volumes:
  mysql_data:
