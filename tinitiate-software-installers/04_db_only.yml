services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ti-db-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Admin12345!
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: ti-db-cloudbeaver
    depends_on:
      - sqlserver
      - tutorials
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace

  tutorials:
    image: alpine/git:latest
    container_name: ti-db-tutorials
    working_dir: /tutorials
    volumes:
      - ./notebooks/tutorials:/tutorials
    command: >
      sh -lc "for repo in
      https://github.com/tinitiateprime/sqlserver.git;
      do name=$$(basename $$repo .git);
      if [ -d $$name/.git ]; then git -C $$name pull --ff-only;
      else git clone $$repo; fi;
      done"

volumes:
  sqlserver_data:
  cloudbeaver_data:
