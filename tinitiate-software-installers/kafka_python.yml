version: '3.9'
services:
  jupyter:
    image: jupyter/base-notebook:latest
    container_name: ti-jupyter-kafka
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: ti-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: ti-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  tutorials:
    image: alpine/git:latest
    container_name: ti-kafka-tutorials
    working_dir: /tutorials
    volumes:
      - ./notebooks/tutorials:/tutorials
    command: >
      sh -lc "for repo in
      https://github.com/tinitiateprime/python.git
      https://github.com/tinitiateprime/kafka.git;
      do name=$$(basename $$repo .git);
      if [ -d $$name/.git ]; then git -C $$name pull --ff-only;
      else git clone $$repo; fi;
      done"
