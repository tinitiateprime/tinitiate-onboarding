version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    container_name: ti-batch-postgres
    environment:
      POSTGRES_USER: tinitiate
      POSTGRES_PASSWORD: Tinitiate!23456
      POSTGRES_DB: tinitiate
      POSTGRES_INITDB_ARGS: '--auth-host=scram-sha-256 --auth-local=scram-sha-256'
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql/db-data:/var/lib/postgresql/data
      - ./postgresql/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tinitiate"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: 10m
        max-file: '3'
    networks:
      - tinitiate

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: ti-batch-dynamodb
    command: '-jar DynamoDBLocal.jar -sharedDb -dbPath ./data'
    ports:
      - '8500:8000'
    volumes:
      - './dynamodb:/home/dynamodblocal/data'
    working_dir: /home/dynamodblocal
    networks:
      - tinitiate

  minio:
    image: minio/minio:latest
    container_name: ti-batch-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - tinitiate

  spark-master:
    image: bde2020/spark-master:latest
    container_name: ti-batch-spark-master
    environment:
      INIT_DAEMON_STEP: setup_spark
    ports:
      - "7077:7077"
      - "8088:8080"
    networks:
      - tinitiate

  spark-worker:
    image: bde2020/spark-worker:latest
    container_name: ti-batch-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    ports:
      - "8089:8081"
    networks:
      - tinitiate

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: ti-batch-jupyter
    depends_on:
      - spark-master
      - tutorials
    ports:
      - "8888:8888"
    environment:
      SPARK_MASTER: spark://spark-master:7077
      JUPYTER_TOKEN: admin123
    volumes:
      - ./notebooks:/home/jovyan/work
    networks:
      - tinitiate

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: ti-batch-airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://tinitiate:Tinitiate!23456@postgres/tinitiate
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com || true"
    networks:
      - tinitiate

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: ti-batch-airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://tinitiate:Tinitiate!23456@postgres/tinitiate
    ports:
      - "8081:8080"
    command: webserver
    networks:
      - tinitiate

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: ti-batch-airflow-scheduler
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://tinitiate:Tinitiate!23456@postgres/tinitiate
    command: scheduler
    networks:
      - tinitiate

  ftp-server:
    image: stilliard/pure-ftpd:hardened
    container_name: ti-batch-ftp
    environment:
      PUBLICHOST: localhost
      FTP_USER_NAME: student
      FTP_USER_PASS: student
      FTP_USER_HOME: /home/ftpusers/student
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      - ftp_data:/home/ftpusers/student
    networks:
      - tinitiate

  tutorials:
    image: alpine/git:latest
    container_name: ti-batch-tutorials
    working_dir: /tutorials
    volumes:
      - ./notebooks/tutorials:/tutorials
    command: >
      sh -lc "for repo in
      https://github.com/tinitiateprime/postgresql.git
      https://github.com/tinitiateprime/aws-dynamo.git
      https://github.com/tinitiateprime/minio.git
      https://github.com/tinitiateprime/pyspark.git
      https://github.com/tinitiateprime/aws-airflow.git
      https://github.com/tinitiateprime/ftp-server.git;
      do name=$$(basename $$repo .git);
      if [ -d $$name/.git ]; then git -C $$name pull --ff-only;
      else git clone $$repo; fi;
      done"
    networks:
      - tinitiate

volumes:
  minio_data:
  ftp_data:

networks:
  tinitiate:
    external: true
