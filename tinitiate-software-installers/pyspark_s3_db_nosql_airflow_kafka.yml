services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ti-realtime-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: metastore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: ti-realtime-dynamodb
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data

  minio:
    image: minio/minio:latest
    container_name: ti-realtime-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ti-realtime-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ti-realtime-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ti-realtime-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  spark-master:
    image: bde2020/spark-master:latest
    container_name: ti-realtime-spark-master
    environment:
      INIT_DAEMON_STEP: setup_spark
    ports:
      - "7077:7077"
      - "8088:8080"

  spark-worker:
    image: bde2020/spark-worker:latest
    container_name: ti-realtime-spark-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    ports:
      - "8089:8081"

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: ti-realtime-jupyter
    depends_on:
      - spark-master
      - tutorials
    ports:
      - "8888:8888"
    environment:
      SPARK_MASTER: spark://spark-master:7077
      JUPYTER_TOKEN: admin123
    volumes:
      - ./notebooks:/home/jovyan/work

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: ti-realtime-airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres/metastore
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname user --role Admin --email admin@example.com || true"

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: ti-realtime-airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres/metastore
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: ti-realtime-airflow-scheduler
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres/metastore
    command: scheduler

  ftp-server:
    image: stilliard/pure-ftpd:hardened
    container_name: ti-realtime-ftp
    environment:
      PUBLICHOST: localhost
      FTP_USER_NAME: student
      FTP_USER_PASS: student
      FTP_USER_HOME: /home/ftpusers/student
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      - ftp_data:/home/ftpusers/student

  tutorials:
    image: alpine/git:latest
    container_name: ti-realtime-tutorials
    working_dir: /tutorials
    volumes:
      - ./notebooks/tutorials:/tutorials
    command: >
      sh -lc "for repo in
      https://github.com/tinitiateprime/postgresql.git
      https://github.com/tinitiateprime/aws-dynamo.git
      https://github.com/tinitiateprime/minio.git
      https://github.com/tinitiateprime/pyspark.git
      https://github.com/tinitiateprime/aws-airflow.git
      https://github.com/tinitiateprime/ftp-server.git
      https://github.com/tinitiateprime/kafka.git;
      do name=$$(basename $$repo .git);
      if [ -d $$name/.git ]; then git -C $$name pull --ff-only;
      else git clone $$repo; fi;
      done"

volumes:
  postgres_data:
  dynamodb_data:
  minio_data:
  ftp_data:
